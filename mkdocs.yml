site_name: agentabi
site_description: Coding Agent CLI 的统一 Python 接口
site_author: Peng Ding
site_url: https://agentabi.readthedocs.io/zh-cn/latest
repo_name: oaklight/agentabi
repo_url: https://github.com/oaklight/agentabi
copyright: Copyright &copy; 2025-2026 Peng Ding

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        首页:
          - index.md
        使用指南:
          - usage/installation.md
          - usage/quickstart.md
          - usage/streaming.md
          - usage/discovery.md
          - usage/native-vs-sdk.md
        API 参考:
          - api/index.md
          - api/session.md
          - api/providers.md
          - api/ir-events.md
          - api/ir-types.md
        示例:
          - examples/index.md
        架构设计:
          - architecture.md
        更新日志:
          - changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/oaklight/agentabi
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentabi/
  alternate:
    - name: English
      link: /en/latest/
      lang: en
    - name: 中文
      link: /zh-cn/latest/
      lang: zh

nav:
  - 首页: index.md
  - 使用指南:
      - 安装: usage/installation.md
      - 快速开始: usage/quickstart.md
      - 流式输出: usage/streaming.md
      - Agent 发现: usage/discovery.md
      - Native vs SDK: usage/native-vs-sdk.md
  - API 参考:
      - 概览: api/index.md
      - Session: api/session.md
      - Providers: api/providers.md
      - IR 事件: api/ir-events.md
      - IR 类型: api/ir-types.md
  - 示例:
      - 概览: examples/index.md
  - 架构设计: architecture.md
  - 更新日志: changelog.md
